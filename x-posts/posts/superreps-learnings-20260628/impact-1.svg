<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="55%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0520"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="tileBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2538"/>
      <stop offset="100%" stop-color="#141e2d"/>
    </linearGradient>
    <radialGradient id="glowTR" cx="1" cy="0" r="0.9">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBL" cx="0" cy="1" r="0.7">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glowTR)"/>
  <rect width="1600" height="900" fill="url(#glowBL)"/>

  <!-- Left vertical accent bar -->
  <rect x="100" y="60" width="4" height="780" rx="2" fill="url(#accent)" fill-opacity="0.5"/>

  <!-- Category label -->
  <text x="130" y="115"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="700" letter-spacing="8" fill="#22d3ee">
    BUILD IN PUBLIC  &#183;  AI ENGINEERING
  </text>

  <!-- Hero line 1 -->
  <text x="130" y="305"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="80" font-weight="900" fill="#f1f5f9" letter-spacing="-2">
    AI builds fast.
  </text>

  <!-- Hero line 2 — gradient fill -->
  <text x="130" y="400"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="80" font-weight="900" fill="url(#accent)" letter-spacing="-2">
    Useful takes time.
  </text>

  <!-- Accent rule below hero -->
  <rect x="130" y="434" width="460" height="3" rx="2" fill="url(#accent)" fill-opacity="0.7"/>

  <!-- Sub-copy line 1 -->
  <text x="130" y="502"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="300" fill="#94a3b8" letter-spacing="0.5">
    &#8220;Looks like an app&#8221; and &#8220;works like an app&#8221;
  </text>
  <!-- Sub-copy line 2 -->
  <text x="130" y="540"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="300" fill="#94a3b8" letter-spacing="0.5">
    are completely different problems.
  </text>

  <!-- Right stat tile -->
  <rect x="1040" y="78" width="460" height="704" rx="20" fill="url(#tileBg)"/>
  <!-- Tile top accent -->
  <rect x="1040" y="78" width="460" height="4" rx="2" fill="url(#accent)" fill-opacity="0.65"/>

  <!-- Tile label -->
  <text x="1270" y="162"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="700" letter-spacing="6" fill="#64748b" text-anchor="middle">
    SCREENS BUILT
  </text>

  <!-- Big stat number -->
  <text x="1270" y="455"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="280" font-weight="900" fill="url(#accent)" text-anchor="middle" letter-spacing="-5">
    6
  </text>

  <!-- Stat sub-label -->
  <text x="1270" y="524"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="24" font-weight="400" fill="#94a3b8" text-anchor="middle">
    before anything worked
  </text>

  <!-- Tile inner divider -->
  <rect x="1068" y="578" width="404" height="1" fill="#ffffff" fill-opacity="0.07"/>

  <!-- Tile insight -->
  <text x="1270" y="626"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="400" fill="#64748b" text-anchor="middle">
    AI designs components.
  </text>
  <text x="1270" y="660"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="700" fill="url(#accent)" text-anchor="middle">
    You design flows.
  </text>

  <!-- Bottom divider (left column) -->
  <rect x="130" y="792" width="882" height="1" fill="#ffffff" fill-opacity="0.08"/>

  <!-- Handle — prominent, accent colour -->
  <text x="130" y="843"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="30" font-weight="700" fill="#22d3ee">
    @teachmebro
  </text>

  <!-- Author byline -->
  <text x="130" y="878"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="400" fill="#334155">
    Altaf Shaikh  &#183;  AI Engineering
  </text>
</svg>
