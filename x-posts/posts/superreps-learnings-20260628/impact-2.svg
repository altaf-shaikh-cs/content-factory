<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.15" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#glow)"/>

  <!-- Decorative quotation mark (background texture) -->
  <text x="55" y="390"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="420" font-weight="700" fill="url(#accent)" fill-opacity="0.08">&#8220;</text>

  <!-- Top accent bar -->
  <rect x="80" y="80" width="180" height="5" rx="3" fill="url(#accent)"/>

  <!-- Category label -->
  <text x="80" y="150"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="700" letter-spacing="7" fill="#334155">
    BUILD IN PUBLIC
  </text>

  <!-- Quote line 1 -->
  <text x="80" y="440"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="66" font-weight="700" fill="#f1f5f9" letter-spacing="-1">
    Six screens in.
  </text>

  <!-- Quote line 2 -->
  <text x="80" y="520"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="66" font-weight="700" fill="#f1f5f9" letter-spacing="-1">
    UI looked clean.
  </text>

  <!-- Quote line 3 — gradient accent -->
  <text x="80" y="600"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="66" font-weight="700" fill="url(#accent)" letter-spacing="-1">
    Nothing worked.
  </text>

  <!-- Sub-note -->
  <text x="80" y="666"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="300" fill="#475569">
    First lesson from building an app with AI.
  </text>

  <!-- Rule -->
  <rect x="80" y="716" width="920" height="1" fill="#ffffff" fill-opacity="0.10"/>

  <!-- Handle — prominent, accent colour -->
  <text x="80" y="778"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="38" font-weight="700" fill="#22d3ee">
    @teachmebro
  </text>

  <!-- Author + domain byline -->
  <text x="80" y="824"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="24" font-weight="400" fill="#475569">
    Altaf Shaikh  &#183;  AI Engineering / Building with AI
  </text>

  <!-- Tagline -->
  <text x="80" y="882"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="300" fill="#334155">
    AI builds fast. Useful takes time.
  </text>

  <!-- Bottom accent bar -->
  <rect x="80" y="980" width="920" height="3" rx="2" fill="url(#accent)" fill-opacity="0.35"/>
</svg>
