<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="55%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0520"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="divider-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="75%"  stop-color="#a78bfa" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowTR" cx="1" cy="0" r="0.9">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBL" cx="0" cy="1" r="0.7">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glowTR)"/>
  <rect width="1600" height="900" fill="url(#glowBL)"/>

  <!-- Left vertical accent bar -->
  <rect x="100" y="60" width="4" height="780" rx="2" fill="url(#accent)" fill-opacity="0.5"/>

  <!-- Category label -->
  <text x="130" y="95"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="700" letter-spacing="8" fill="#22d3ee">
    AI ENGINEERING  &#183;  SHIFT
  </text>

  <!-- ── LEFT PANEL: CAPABILITY ── -->

  <!-- Sub-label -->
  <text x="130" y="198"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" font-weight="700" letter-spacing="7" fill="#475569">
    YOU CALL IT
  </text>

  <!-- Big word -->
  <text x="130" y="320"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="88" font-weight="900" fill="#e2e8f0" letter-spacing="-2">
    CAPABILITY
  </text>

  <!-- Accent rule under word -->
  <rect x="130" y="346" width="380" height="3" rx="2" fill="url(#accent)" fill-opacity="0.4"/>

  <!-- Descriptors -->
  <text x="130" y="408"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="300" fill="#64748b">
    You trigger it manually.
  </text>
  <text x="130" y="450"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="300" fill="#64748b">
    One-off. Waits for you.
  </text>

  <!-- ── CENTER DIVIDER ── -->
  <rect x="800" y="148" width="2" height="476" rx="1" fill="url(#divider-grad)"/>

  <!-- ── RIGHT PANEL: INFRASTRUCTURE ── -->

  <!-- Sub-label -->
  <text x="840" y="198"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" font-weight="700" letter-spacing="7" fill="url(#accent)">
    IT RUNS ITSELF
  </text>

  <!-- Big word (gradient, slightly smaller to fit) -->
  <text x="840" y="320"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="70" font-weight="900" fill="url(#accent)" letter-spacing="-4">
    INFRASTRUCTURE
  </text>

  <!-- Accent rule under word -->
  <rect x="840" y="346" width="520" height="3" rx="2" fill="url(#accent)" fill-opacity="0.8"/>

  <!-- Descriptors -->
  <text x="840" y="408"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="300" fill="#94a3b8">
    Autonomous. Scheduled.
  </text>
  <text x="840" y="450"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="300" fill="#94a3b8">
    Keeps going without you.
  </text>

  <!-- ── CENTER QUOTE STRIP ── -->
  <text x="800" y="572"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="34" font-weight="400" fill="#64748b" text-anchor="middle">
    /loop changed that for me. Day one. Still feels weird to watch.
  </text>

  <!-- Bottom divider -->
  <rect x="130" y="630" width="1340" height="1" fill="#ffffff" fill-opacity="0.08"/>

  <!-- Handle (prominent, gradient) -->
  <text x="130" y="692"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="30" font-weight="700" fill="url(#accent)">
    @teachmebro
  </text>

  <!-- Author + domain -->
  <text x="130" y="730"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="400" fill="#475569">
    Altaf Shaikh  &#183;  AI Engineering
  </text>

  <!-- Tagline (right-aligned) -->
  <text x="1470" y="710"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="19" font-weight="400" letter-spacing="5" fill="#334155"
        text-anchor="end">
    SET IT. LET IT LOOP.
  </text>
</svg>
