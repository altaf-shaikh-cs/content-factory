<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <pattern id="dotgrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#e3d9c8" />
    </pattern>
    <linearGradient id="mascotBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0794f" />
      <stop offset="100%" stop-color="#e8603c" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#f7f2ea" />
  <rect x="0" y="0" width="1600" height="900" fill="url(#dotgrid)" />

  <!-- corner tick decoration, top left -->
  <line x1="40" y1="40" x2="40" y2="80" stroke="#c9bda8" stroke-width="2" />
  <line x1="20" y1="60" x2="60" y2="60" stroke="#c9bda8" stroke-width="2" />

  <!-- diagonal hatch, bottom left -->
  <g stroke="#d8ccb8" stroke-width="4">
    <line x1="40" y1="820" x2="70" y2="850" />
    <line x1="55" y1="805" x2="85" y2="835" />
    <line x1="70" y1="790" x2="100" y2="820" />
  </g>

  <!-- eyebrow -->
  <g transform="translate(90,88)">
    <path d="M0 -10 L3 -3 L10 0 L3 3 L0 10 L-3 3 L-10 0 L-3 -3 Z" fill="#e8603c" />
    <text x="20" y="5" font-family="'Courier New', monospace" font-size="20" font-weight="700" letter-spacing="4" fill="#e8603c">CLAUDE CODE LESSONS</text>
  </g>

  <!-- headline -->
  <text x="88" y="220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="70" font-weight="800" fill="#1a1a1a">Clarity is</text>
  <text x="88" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="70" font-weight="800" fill="#1a1a1a">the bottleneck</text>

  <!-- sub-label -->
  <text x="90" y="365" font-family="'Courier New', monospace" font-size="24" fill="#6b6156">25 lessons from shipping features</text>
  <text x="90" y="397" font-family="'Courier New', monospace" font-size="24" fill="#6b6156">with Claude Code, not the model's fault.</text>

  <!-- terminal window -->
  <rect x="820" y="130" width="480" height="560" rx="18" fill="#17161a" />
  <rect x="820" y="130" width="480" height="48" rx="18" fill="#211f24" />
  <rect x="820" y="160" width="480" height="18" fill="#211f24" />
  <circle cx="852" cy="154" r="7" fill="#ff5f56" />
  <circle cx="876" cy="154" r="7" fill="#ffbd2e" />
  <circle cx="900" cy="154" r="7" fill="#27c93f" />

  <text x="852" y="222" font-family="'Courier New', monospace" font-size="30" font-weight="700" fill="#e2ddd6">&gt; <tspan fill="#e8603c">spec.md</tspan></text>

  <!-- pixel mascot -->
  <g transform="translate(852,250)">
    <rect x="0" y="20" width="120" height="110" rx="10" fill="url(#mascotBody)" />
    <rect x="20" y="45" width="18" height="18" fill="#17161a" />
    <rect x="82" y="45" width="18" height="18" fill="#17161a" />
    <rect x="35" y="80" width="50" height="10" rx="5" fill="#17161a" />
    <rect x="-14" y="55" width="16" height="45" rx="6" fill="url(#mascotBody)" />
    <rect x="118" y="55" width="16" height="45" rx="6" fill="url(#mascotBody)" />
    <rect x="30" y="130" width="18" height="30" fill="url(#mascotBody)" />
    <rect x="72" y="130" width="18" height="30" fill="url(#mascotBody)" />
    <path d="M50 8 L60 -10 L70 8 Z" fill="#f4c04a" />
  </g>

  <!-- step list -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <rect x="1010" y="255" width="26" height="26" rx="6" fill="none" stroke="#e8603c" stroke-width="2" />
    <text x="1024" y="273" font-size="14" fill="#e8603c" text-anchor="middle" font-weight="700">1</text>
    <text x="1050" y="273" font-size="22" font-weight="700" fill="#f2ede4">Spec first</text>
    <text x="1050" y="296" font-size="15" fill="#9a9186" font-family="'Courier New', monospace">screenshots, schema, scope</text>

    <rect x="1010" y="325" width="26" height="26" rx="6" fill="none" stroke="#e8603c" stroke-width="2" />
    <text x="1024" y="343" font-size="14" fill="#e8603c" text-anchor="middle" font-weight="700">2</text>
    <text x="1050" y="343" font-size="22" font-weight="700" fill="#f2ede4">Structure it</text>
    <text x="1050" y="366" font-size="15" fill="#9a9186" font-family="'Courier New', monospace">XML tags beat plain prose</text>

    <rect x="1010" y="395" width="26" height="26" rx="6" fill="none" stroke="#e8603c" stroke-width="2" />
    <text x="1024" y="413" font-size="14" fill="#e8603c" text-anchor="middle" font-weight="700">3</text>
    <text x="1050" y="413" font-size="22" font-weight="700" fill="#f2ede4">Split the work</text>
    <text x="1050" y="436" font-size="15" fill="#9a9186" font-family="'Courier New', monospace">many small agents, not one</text>

    <rect x="1010" y="465" width="26" height="26" rx="6" fill="none" stroke="#e8603c" stroke-width="2" />
    <text x="1024" y="483" font-size="14" fill="#e8603c" text-anchor="middle" font-weight="700">4</text>
    <text x="1050" y="483" font-size="22" font-weight="700" fill="#f2ede4">Guard the loop</text>
    <text x="1050" y="506" font-size="15" fill="#9a9186" font-family="'Courier New', monospace">commit, checkpoint, restart</text>
  </g>

  <!-- connector lines to right-side tags -->
  <g stroke="#c9bda8" stroke-width="1.5" stroke-dasharray="4 4" fill="none">
    <path d="M1300 268 H1330 V210 H1360" />
    <path d="M1300 338 H1330 V338" />
    <path d="M1300 408 H1330 V460 H1360" />
    <path d="M1300 478 H1330 V530 H1360" />
  </g>

  <!-- right side tags -->
  <g font-family="'Courier New', monospace">
    <rect x="1360" y="182" width="180" height="56" rx="12" fill="#fffdfa" stroke="#e3d9c8" stroke-width="2" />
    <text x="1450" y="217" font-size="22" font-weight="700" fill="#1a1a1a" text-anchor="middle">screenshots</text>

    <rect x="1360" y="310" width="180" height="56" rx="12" fill="#fffdfa" stroke="#e3d9c8" stroke-width="2" />
    <text x="1450" y="345" font-size="22" font-weight="700" fill="#1a1a1a" text-anchor="middle">xml tags</text>

    <rect x="1360" y="432" width="180" height="56" rx="12" fill="#fffdfa" stroke="#e3d9c8" stroke-width="2" />
    <text x="1450" y="467" font-size="22" font-weight="700" fill="#1a1a1a" text-anchor="middle">sub-agents</text>

    <rect x="1360" y="502" width="180" height="56" rx="12" fill="#fffdfa" stroke="#e3d9c8" stroke-width="2" />
    <text x="1450" y="537" font-size="22" font-weight="700" fill="#1a1a1a" text-anchor="middle">checkpoints</text>
  </g>

  <!-- footer -->
  <line x1="90" y1="770" x2="1540" y2="770" stroke="#e3d9c8" stroke-width="2" />
  <text x="90" y="808" font-family="'Courier New', monospace" font-size="20" letter-spacing="2" fill="#9a9186">YOUR CLARITY IS THE BOTTLENECK, NOT THE AGENT</text>
  <text x="90" y="850" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="800" fill="#e8603c">@teachmebro</text>
  <text x="1540" y="850" font-family="'Courier New', monospace" font-size="20" fill="#6b6156" text-anchor="end">Altaf Shaikh &#183; AI Engineering</text>
</svg>
