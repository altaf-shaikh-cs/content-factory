<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#059669"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#f5f1e7"/>

  <text x="80" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="58" font-weight="800" fill="#14181f">SAME ACCURACY.</text>
  <rect x="378" y="138" width="470" height="62" fill="#5eead4"/>
  <text x="80" y="182" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="58" font-weight="800" fill="#14181f">LESS THAN <tspan fill="#0f172a">HALF THE COST</tspan></text>

  <!-- Left card: Advisor -->
  <rect x="80" y="230" width="700" height="470" rx="24" fill="#e0edff" stroke="#93c5fd" stroke-width="2"/>
  <text x="120" y="288" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="800" letter-spacing="3" fill="#1e3a8a">PATTERN 1 &#183; ADVISOR</text>

  <!-- escalate-up icon -->
  <circle cx="705" cy="330" r="18" fill="#ffffff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="705" y="336" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1e3a8a">S</text>
  <line x1="705" y1="310" x2="705" y2="276" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <circle cx="705" cy="258" r="18" fill="#ffffff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="705" y="264" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1e3a8a">F</text>

  <text x="120" y="330" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#334155">Sonnet 5 executes.</text>
  <text x="120" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#334155">Fable 5 steers on call, roughly once per task.</text>

  <text x="160" y="530" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="96" font-weight="900" fill="#1d4ed8">92%</text>
  <text x="160" y="565" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#334155">of Fable 5 solo performance</text>

  <text x="460" y="530" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="96" font-weight="900" fill="#1d4ed8">63%</text>
  <text x="460" y="565" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#334155">of the price</text>

  <text x="120" y="655" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="700" letter-spacing="2" fill="#64748b">SWE-BENCH PRO</text>

  <!-- Right card: Orchestrator -->
  <rect x="820" y="230" width="700" height="470" rx="24" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="860" y="288" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="800" letter-spacing="3" fill="#065f46">PATTERN 2 &#183; ORCHESTRATOR</text>

  <!-- delegate-down icon -->
  <circle cx="1445" cy="262" r="18" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="1445" y="268" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#065f46">F</text>
  <line x1="1432" y1="276" x2="1400" y2="310" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="1445" y1="280" x2="1445" y2="310" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="1458" y1="276" x2="1490" y2="310" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <circle cx="1400" cy="328" r="16" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="1400" y="333" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#065f46">S</text>
  <circle cx="1445" cy="328" r="16" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="1445" y="333" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#065f46">S</text>
  <circle cx="1490" cy="328" r="16" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="1490" y="333" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#065f46">S</text>

  <text x="860" y="330" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#334155">Fable 5 plans. Sonnet 5 workers execute.</text>
  <text x="860" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#334155">Most tokens billed at the worker rate.</text>

  <text x="900" y="530" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="96" font-weight="900" fill="#059669">96%</text>
  <text x="900" y="565" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#334155">of Fable 5 solo performance</text>

  <text x="1200" y="530" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="96" font-weight="900" fill="#059669">46%</text>
  <text x="1200" y="565" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#334155">of the price</text>

  <text x="860" y="610" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#334155">$18.53 vs $40.56 per problem &#183; 86.8% vs 90.8% accuracy</text>

  <text x="860" y="655" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="700" letter-spacing="2" fill="#64748b">BROWSECOMP</text>

  <text x="800" y="748" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="21" fill="#64748b">All-Sonnet baseline: $16.01 per problem, but accuracy drops to 77.8%. Cheaper isn&#8217;t always cheaper.</text>

  <rect x="80" y="800" width="1440" height="4" rx="2" fill="url(#accentLine)"/>

  <text x="80" y="846" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" font-weight="600" fill="#14181f">Two Patterns for Running Fable 5 at a Fraction of the Cost</text>

  <text x="1520" y="840" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="800" fill="#0d9488">@teachmebro</text>
  <text x="1520" y="870" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#475569">Altaf Shaikh &#183; AI Engineering</text>
</svg>
