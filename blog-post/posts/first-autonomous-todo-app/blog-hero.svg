<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .cat { font-family: 'SFMono-Regular', Menlo, Consolas, monospace; font-size: 22px; font-weight: 700; letter-spacing: 7px; fill: #6b6259; }
      .headline { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 112px; font-weight: 900; }
      .sub { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 36px; font-weight: 600; fill: #241f1a; }
      .statnum { font-family: 'SFMono-Regular', Menlo, Consolas, monospace; font-size: 68px; font-weight: 800; fill: #cc5a2a; }
      .statlabel { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 24px; font-weight: 400; fill: #6b6259; }
      .name { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 30px; font-weight: 800; fill: #241f1a; }
      .role { font-family: 'SFMono-Regular', Menlo, Consolas, monospace; font-size: 20px; fill: #6b6259; }
      .tag { font-family: 'SFMono-Regular', Menlo, Consolas, monospace; font-size: 22px; fill: #6b6259; }
      .handle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 24px; font-weight: 700; fill: #1c6fd9; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#f0eae0"/>

  <!-- category label -->
  <line x1="90" y1="103" x2="130" y2="103" stroke="#a49b8f" stroke-width="3"/>
  <text x="146" y="112" class="cat">AUTONOMOUS BUILD EXPERIMENT</text>

  <!-- decorative node chain: 4 ticks -->
  <g stroke="#c7bfb2" stroke-width="1.5" fill="none">
    <path d="M 1180 95 L 1260 160 L 1340 120 L 1430 200"/>
  </g>
  <circle cx="1180" cy="95" r="6" fill="#cc5a2a"/>
  <circle cx="1260" cy="160" r="6" fill="#1c6fd9"/>
  <circle cx="1340" cy="120" r="6" fill="#cc5a2a"/>
  <circle cx="1430" cy="200" r="6" fill="#1c6fd9"/>
  <circle cx="1500" cy="90" r="4" fill="#c7bfb2"/>
  <circle cx="1540" cy="150" r="3" fill="#c7bfb2"/>

  <!-- headline -->
  <text x="90" y="270" class="headline" xml:space="preserve"><tspan fill="#cc5a2a">Zero </tspan><tspan fill="#241f1a">Intervention.</tspan></text>
  <text x="90" y="410" class="headline" xml:space="preserve"><tspan fill="#241f1a">Not </tspan><tspan fill="#1c6fd9">Less.</tspan></text>

  <!-- subhead with accent bar -->
  <rect x="90" y="500" width="6" height="86" fill="#cc5a2a"/>
  <text x="126" y="537" class="sub">The milestone isn&#8217;t better code.</text>
  <text x="126" y="577" class="sub">It&#8217;s code that <tspan fill="#1c6fd9">verifies itself</tspan>.</text>

  <!-- stat row -->
  <text x="90" y="700" class="statnum">4 ticks</text>
  <text x="90" y="735" class="statlabel">one PRD, planned and tested end-to-end</text>

  <line x1="660" y1="640" x2="660" y2="740" stroke="#c7bfb2" stroke-width="1.5"/>

  <text x="710" y="700" class="statnum" fill="#1c6fd9">0</text>
  <text x="710" y="735" class="statlabel">corrections made during the build</text>

  <!-- footer divider -->
  <line x1="90" y1="800" x2="1510" y2="800" stroke="#c7bfb2" stroke-width="1"/>

  <!-- byline -->
  <text x="90" y="843" class="name">Altaf Shaikh</text>
  <text x="90" y="872" class="role">// AI Engineering</text>

  <!-- tagline + handle -->
  <text x="1510" y="835" text-anchor="end" class="tag">I got my Hello World moment twice</text>
  <g>
    <circle cx="1300" cy="866" r="6" fill="#cc5a2a"/>
    <circle cx="1316" cy="866" r="6" fill="#1c6fd9"/>
    <text x="1510" y="874" text-anchor="end" class="handle">@teachmebro</text>
  </g>
</svg>
