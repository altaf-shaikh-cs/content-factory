<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="handleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#f1ece0"/>

  <!-- decorative constellation, top right: a signal crossing a gap -->
  <g stroke="#cfc6b2" stroke-width="1.5" fill="none" opacity="0.9">
    <line x1="1180" y1="260" x2="1310" y2="150"/>
    <line x1="1310" y1="150" x2="1440" y2="200"/>
    <line x1="1440" y1="200" x2="1520" y2="90"/>
  </g>
  <circle cx="1180" cy="260" r="7" fill="#ea580c"/>
  <circle cx="1310" cy="150" r="5" fill="#cfc6b2"/>
  <circle cx="1440" cy="200" r="5" fill="#cfc6b2"/>
  <circle cx="1520" cy="90" r="7" fill="#2563eb"/>

  <!-- eyebrow -->
  <line x1="100" y1="105" x2="140" y2="105" stroke="#8a8a8a" stroke-width="3"/>
  <text x="156" y="112" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700" letter-spacing="6" fill="#6b6b6b">A PHRASE YOUR AI KEEPS BORROWING</text>

  <!-- headline -->
  <text x="98" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="128" font-weight="800" fill="#1a1a1a">Say The <tspan fill="#ea580c">Word</tspan></text>
  <text x="98" y="430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="128" font-weight="800" fill="#1a1a1a">Is The <tspan fill="#2563eb">Point</tspan></text>

  <!-- sub statement -->
  <rect x="98" y="486" width="6" height="90" fill="#ea580c"/>
  <text x="128" y="524" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="600" fill="#2a2a2a">It&#8217;s not politeness, it&#8217;s a <tspan fill="#ea580c" font-weight="700">completed threshold</tspan>.</text>
  <text x="128" y="566" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="600" fill="#2a2a2a">The phrase that once closed a <tspan fill="#2563eb" font-weight="700">two-thousand-year gap</tspan>.</text>

  <!-- contrast tiles -->
  <text x="100" y="676" font-family="'SF Mono', Menlo, monospace" font-size="68" font-weight="800" fill="#ea580c">the word</text>
  <text x="100" y="712" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" letter-spacing="2" fill="#7a7264">spoken once</text>

  <line x1="800" y1="600" x2="800" y2="700" stroke="#cfc6b2" stroke-width="1.5"/>

  <text x="850" y="676" font-family="'SF Mono', Menlo, monospace" font-size="68" font-weight="800" fill="#2563eb">the gap</text>
  <text x="850" y="712" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" letter-spacing="2" fill="#7a7264">closed instantly</text>

  <!-- footer divider -->
  <line x1="100" y1="760" x2="1500" y2="760" stroke="#dcd4c2" stroke-width="1.5"/>

  <!-- footer left: author -->
  <text x="100" y="812" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="700" fill="#1a1a1a">Altaf Shaikh</text>
  <text x="100" y="842" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#8a8272">// AI Engineering</text>

  <!-- footer right: handle prominent, then tagline -->
  <text x="1500" y="806" text-anchor="end" font-family="'SF Mono', Menlo, monospace" font-size="34" font-weight="800" fill="url(#handleGradient)">@teachmebro</text>
  <text x="1500" y="838" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#8a8272">matthew 8:8, still in production</text>
</svg>
