<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cyanFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="violetFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Light background -->
  <rect width="1080" height="1080" fill="#fdfcf8"/>

  <!-- Title -->
  <text x="540" y="96"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="44" font-weight="800" text-anchor="middle" fill="#1f2937">Two Ways to Run a Hybrid Model Stack</text>
  <text x="540" y="140"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="24" font-weight="400" text-anchor="middle" fill="#6b7280">near top-model quality at roughly half the cost</text>

  <!-- Left card: Advisor -->
  <rect x="70" y="190" width="450" height="470" rx="20" fill="#ecfeff" stroke="#0891b2" stroke-width="2.5"/>
  <text x="100" y="246"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="30" font-weight="800" fill="#0e7490">1. Advisor</text>
  <text x="100" y="280"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="600" fill="#0891b2" letter-spacing="2">ESCALATE UP</text>

  <!-- Advisor diagram -->
  <rect x="120" y="330" width="350" height="70" rx="12" fill="#164e63"/>
  <text x="295" y="364"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="700" text-anchor="middle" fill="#a5f3fc">Fable 5 &#183; advisor</text>
  <text x="295" y="390"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="16" text-anchor="middle" fill="#67e8f9">called ~once per task</text>

  <path d="M 295 470 L 295 415" stroke="#0891b2" stroke-width="3" fill="none" stroke-dasharray="7 6"/>
  <path d="M 287 425 L 295 413 L 303 425" stroke="#0891b2" stroke-width="3" fill="none"/>

  <rect x="120" y="470" width="350" height="70" rx="12" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
  <text x="295" y="504"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="700" text-anchor="middle" fill="#0e7490">Sonnet 5 &#183; executor</text>
  <text x="295" y="530"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="16" text-anchor="middle" fill="#0891b2">runs the whole loop</text>

  <!-- Advisor result -->
  <text x="295" y="600"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="34" font-weight="900" text-anchor="middle" fill="#0e7490">92% score &#183; 63% price</text>
  <text x="295" y="634"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" text-anchor="middle" fill="#6b7280">SWE-bench Pro</text>

  <!-- Right card: Orchestrator -->
  <rect x="560" y="190" width="450" height="470" rx="20" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="590" y="246"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="30" font-weight="800" fill="#6d28d9">2. Orchestrator</text>
  <text x="590" y="280"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="600" fill="#7c3aed" letter-spacing="2">DELEGATE DOWN</text>

  <!-- Orchestrator diagram -->
  <rect x="610" y="330" width="350" height="70" rx="12" fill="#3b0764"/>
  <text x="785" y="364"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="700" text-anchor="middle" fill="#ddd6fe">Fable 5 &#183; planner</text>
  <text x="785" y="390"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="16" text-anchor="middle" fill="#c4b5fd">plans + final review</text>

  <path d="M 705 405 L 665 465" stroke="#7c3aed" stroke-width="3" fill="none"/>
  <path d="M 663 452 L 664 467 L 677 461" stroke="#7c3aed" stroke-width="3" fill="none"/>
  <path d="M 785 405 L 785 465" stroke="#7c3aed" stroke-width="3" fill="none"/>
  <path d="M 777 455 L 785 467 L 793 455" stroke="#7c3aed" stroke-width="3" fill="none"/>
  <path d="M 865 405 L 905 465" stroke="#7c3aed" stroke-width="3" fill="none"/>
  <path d="M 893 461 L 906 467 L 907 452" stroke="#7c3aed" stroke-width="3" fill="none"/>

  <rect x="610" y="470" width="106" height="70" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <text x="663" y="510"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="17" font-weight="700" text-anchor="middle" fill="#6d28d9">worker</text>
  <rect x="732" y="470" width="106" height="70" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <text x="785" y="510"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="17" font-weight="700" text-anchor="middle" fill="#6d28d9">worker</text>
  <rect x="854" y="470" width="106" height="70" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <text x="907" y="510"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="17" font-weight="700" text-anchor="middle" fill="#6d28d9">worker</text>
  <text x="785" y="562"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="16" text-anchor="middle" fill="#7c3aed">Sonnet 5 sub-agents, each with its own cache</text>

  <!-- Orchestrator result -->
  <text x="785" y="606"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="34" font-weight="900" text-anchor="middle" fill="#6d28d9">96% perf &#183; 46% price</text>
  <text x="785" y="638"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" text-anchor="middle" fill="#6b7280">BrowseComp</text>

  <!-- Hero comparison -->
  <text x="540" y="790"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="88" font-weight="900" text-anchor="middle" fill="#1f2937">$18.53 <tspan fill="#9ca3af" font-weight="400">vs</tspan> $40.56</text>
  <text x="540" y="836"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="24" text-anchor="middle" fill="#6b7280">per problem &#183; hybrid vs solo top model</text>

  <!-- Divider -->
  <rect x="140" y="880" width="800" height="1" fill="#d1d5db"/>

  <!-- Caution line -->
  <text x="540" y="930"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" text-anchor="middle" fill="#b91c1c">All-cheap was $16.01, but accuracy fell from 86.8% to 77.8%</text>
  <text x="540" y="964"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" text-anchor="middle" fill="#6b7280">The structure is the saving, not the cheap model alone.</text>

  <!-- Footer -->
  <text x="540" y="1020"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="24" font-weight="300" text-anchor="middle" fill="#6b7280" letter-spacing="1">Not which model. Which model for which part.</text>
  <text x="540" y="1054"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="24" font-weight="800" text-anchor="middle" fill="#0891b2">@teachmebro <tspan fill="#9ca3af" font-weight="500" font-size="19">&#183; Altaf Shaikh &#183; AI Engineering</tspan></text>
</svg>
