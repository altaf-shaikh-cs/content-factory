  <text x="80" y="898" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="30" font-weight="600" fill="#e2e8f0">If you're confused, the AI is too.</text>

  <text x="80" y="990" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="700" fill="#22d3ee">@teachmebro</text>
  <text x="80" y="1024" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="600" fill="#64748b">Altaf Shaikh &#183; AI Engineering</text>
