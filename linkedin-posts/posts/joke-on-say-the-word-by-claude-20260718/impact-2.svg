<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="g2-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <!-- Warm cream background -->
  <rect width="1080" height="1350" fill="#f0ece4"/>

  <!-- Corner register marks — top-left -->
  <line x1="22" y1="33" x2="48" y2="33" stroke="#0d0d1a" stroke-width="1.5" opacity="0.5"/>
  <line x1="35" y1="20" x2="35" y2="46" stroke="#0d0d1a" stroke-width="1.5" opacity="0.5"/>
  <!-- Corner register marks — top-right -->
  <line x1="1032" y1="33" x2="1058" y2="33" stroke="#0d0d1a" stroke-width="1.5" opacity="0.5"/>
  <line x1="1045" y1="20" x2="1045" y2="46" stroke="#0d0d1a" stroke-width="1.5" opacity="0.5"/>
  <!-- Corner register marks — bottom-left -->
  <line x1="22" y1="1317" x2="48" y2="1317" stroke="#0d0d1a" stroke-width="1.5" opacity="0.5"/>
  <line x1="35" y1="1304" x2="35" y2="1330" stroke="#0d0d1a" stroke-width="1.5" opacity="0.5"/>
  <!-- Corner register marks — bottom-right -->
  <line x1="1032" y1="1317" x2="1058" y2="1317" stroke="#0d0d1a" stroke-width="1.5" opacity="0.5"/>
  <line x1="1045" y1="1304" x2="1045" y2="1330" stroke="#0d0d1a" stroke-width="1.5" opacity="0.5"/>

  <!-- Cross marks (editorial style) -->
  <line x1="545" y1="36" x2="555" y2="36" stroke="#0d0d1a" stroke-width="1" opacity="0.3"/>
  <line x1="550" y1="31" x2="550" y2="41" stroke="#0d0d1a" stroke-width="1" opacity="0.3"/>

  <!-- Diamond accent shapes (top right area) -->
  <polygon points="960,58 966,64 960,70 954,64" fill="#e55a2b" opacity="0.9"/>
  <polygon points="990,42 994,46 990,50 986,46" fill="#e55a2b" opacity="0.5"/>

  <!-- Orange badge: CLAUDE CODE -->
  <rect x="80" y="72" width="208" height="44" rx="4" fill="#e55a2b"/>
  <text x="184" y="100"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="17" font-weight="700" fill="#ffffff"
        text-anchor="middle" letter-spacing="3">CLAUDE CODE</text>

  <!-- Decorative dot cluster (top right) -->
  <circle cx="920" cy="90" r="5" fill="#0d0d1a" opacity="0.2"/>
  <circle cx="942" cy="90" r="5" fill="#0d0d1a" opacity="0.2"/>
  <circle cx="964" cy="90" r="5" fill="#0d0d1a" opacity="0.2"/>

  <!-- Bold headline line 1: dark -->
  <text x="80" y="250"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="92" font-weight="900" fill="#0d0d1a">You don&#8217;t need</text>

  <!-- Bold headline line 2: orange accent -->
  <text x="80" y="356"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="92" font-weight="900" fill="#e55a2b">better prompts.</text>

  <!-- Short rule + subtext -->
  <rect x="80" y="390" width="36" height="3" rx="1.5" fill="#e55a2b"/>
  <text x="126" y="404"
        font-family="'Courier New',Courier,monospace"
        font-size="22" fill="#5a5040">Stop ignoring the ones Claude already gave you.</text>

  <!-- Terminal card -->
  <rect x="80" y="432" width="920" height="336" rx="14" fill="url(#g2-card)"/>

  <!-- Terminal header bar -->
  <rect x="80" y="432" width="920" height="48" rx="14" fill="#1a2035"/>
  <rect x="80" y="452" width="920" height="28" fill="#1a2035"/>

  <!-- Traffic light dots -->
  <circle cx="116" cy="457" r="8" fill="#e55a2b"/>
  <circle cx="142" cy="457" r="8" fill="#f59e0b"/>
  <circle cx="168" cy="457" r="8" fill="#4ade80"/>

  <!-- Terminal title text -->
  <text x="540" y="463"
        font-family="'Courier New',Courier,monospace"
        font-size="17" fill="#64748b" text-anchor="middle">claude &#8212; interactive session</text>

  <!-- "CLAUDE SAYS" label inside card -->
  <text x="115" y="522"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="15" font-weight="700" fill="#e55a2b" letter-spacing="5">CLAUDE SAYS</text>

  <!-- Main phrase in card: large -->
  <text x="115" y="606"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="74" font-weight="900" fill="#f0e8d8">&#8220;Say the word.&#8221;</text>

  <!-- Sub phrase in card -->
  <text x="115" y="664"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="32" font-weight="400" fill="#94a3b8">and I&#8217;ll get started.</text>

  <!-- Blinking cursor (static) -->
  <rect x="115" y="692" width="20" height="36" rx="2" fill="#e55a2b" opacity="0.75"/>

  <!-- Insight text block -->
  <text x="80" y="844"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="44" font-weight="700" fill="#0d0d1a">The best prompt you can</text>
  <text x="80" y="902"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="44" font-weight="700" fill="#0d0d1a">give Claude is the one</text>
  <text x="80" y="960"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="44" font-weight="700" fill="#e55a2b">it already asked for.</text>

  <!-- Separator line -->
  <line x1="80" y1="1022" x2="1000" y2="1022"
        stroke="#0d0d1a" stroke-width="1" opacity="0.18"/>

  <!-- Handle -->
  <text x="80" y="1088"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="36" font-weight="700" fill="#e55a2b">@teachmebro</text>

  <!-- Author -->
  <text x="80" y="1136"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="24" font-weight="400" fill="#5a5040">Altaf Shaikh &#183; AI Engineering</text>
</svg>
