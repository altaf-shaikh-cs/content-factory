<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="g1-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="30%" stop-color="#a855f7" stop-opacity="0.85"/>
      <stop offset="70%" stop-color="#f97316" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
    <filter id="g1-blur" x="-100%" y="-800%" width="300%" height="1700%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18"/>
    </filter>
    <linearGradient id="g1-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8f8f8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#g1-bg)"/>

  <!-- Decorative corner accent dots (top right) -->
  <circle cx="970" cy="70" r="6" fill="#7c3aed" opacity="0.25"/>
  <circle cx="993" cy="70" r="6" fill="#7c3aed" opacity="0.15"/>
  <circle cx="970" cy="93" r="6" fill="#7c3aed" opacity="0.15"/>

  <!-- Category label -->
  <text x="540" y="92"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="20" font-weight="700" fill="#7c3aed"
        text-anchor="middle" letter-spacing="7">AI ENGINEERING</text>

  <!-- Hero: SAY -->
  <text x="540" y="400"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="285" font-weight="900" fill="#1a1a1a"
        text-anchor="middle">SAY</text>

  <!-- Hero: THE WORD. (split color) -->
  <text x="540" y="520"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="122" font-weight="900"
        text-anchor="middle"><tspan fill="#1a1a1a">THE </tspan><tspan fill="#7c3aed">WORD.</tspan></text>

  <!-- Glow separator bar -->
  <rect x="140" y="553" width="800" height="22" rx="11"
        fill="url(#g1-glow)" filter="url(#g1-blur)"/>

  <!-- Hook line 1 -->
  <text x="540" y="668"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="50" font-weight="700" fill="#1a1a1a"
        text-anchor="middle">You don&#8217;t need</text>

  <!-- Hook line 2 (accent) -->
  <text x="540" y="736"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="50" font-weight="700" fill="#7c3aed"
        text-anchor="middle">better prompts.</text>

  <!-- Thin separator -->
  <line x1="440" y1="808" x2="640" y2="808"
        stroke="#d4d4d4" stroke-width="1.5"/>

  <!-- Handle -->
  <text x="540" y="873"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="30" font-weight="700" fill="#7c3aed"
        text-anchor="middle">@teachmebro</text>

  <!-- Author byline -->
  <text x="540" y="916"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="20" font-weight="400" fill="#aaaaaa"
        text-anchor="middle">Altaf Shaikh &#183; AI Engineering</text>
</svg>
