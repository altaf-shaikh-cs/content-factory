<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="60%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="tileBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2433"/>
      <stop offset="100%" stop-color="#161c2e"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="infra" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="heroGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bg)"/>

  <!-- Subtle grid overlay -->
  <g opacity="0.04" stroke="#22d3ee" stroke-width="1" fill="none">
    <line x1="0" y1="270" x2="1080" y2="270"/>
    <line x1="0" y1="540" x2="1080" y2="540"/>
    <line x1="0" y1="810" x2="1080" y2="810"/>
    <line x1="0" y1="1080" x2="1080" y2="1080"/>
    <line x1="270" y1="0" x2="270" y2="1350"/>
    <line x1="540" y1="0" x2="540" y2="1350"/>
    <line x1="810" y1="0" x2="810" y2="1350"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1080" height="5" fill="url(#accent)"/>

  <!-- Top label -->
  <text x="540" y="78" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="21" fill="#22d3ee" text-anchor="middle" letter-spacing="6" opacity="0.8">CLAUDE CODE · /loop</text>

  <!-- Decorative rule -->
  <line x1="80" y1="98" x2="1000" y2="98" stroke="url(#accent)" stroke-width="1" opacity="0.25"/>

  <!-- Hero: LOOP ENGINEERING -->
  <text x="540" y="220" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="100" font-weight="800" fill="url(#heroGrad)" text-anchor="middle" filter="url(#heroGlow)" letter-spacing="-3">LOOP</text>
  <text x="540" y="330" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="100" font-weight="800" fill="url(#heroGrad)" text-anchor="middle" filter="url(#heroGlow)" letter-spacing="-3">ENGINEERING</text>

  <!-- Hero subtitle -->
  <text x="540" y="385" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="28" fill="#64748b" text-anchor="middle" letter-spacing="1">your agents run while you think about the next idea</text>

  <!-- Decorative rule -->
  <line x1="160" y1="415" x2="920" y2="415" stroke="url(#accent)" stroke-width="1" opacity="0.2"/>

  <!-- Pipeline label -->
  <text x="540" y="462" font-family="'SF Mono', 'Fira Code', monospace" font-size="18" fill="#475569" text-anchor="middle" letter-spacing="4">THE 3-AGENT PIPELINE</text>

  <!-- Agent Tile 1: STRATEGIST -->
  <rect x="55" y="482" width="280" height="200" rx="16" fill="url(#tileBg)" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.35"/>
  <text x="195" y="544" font-family="'SF Mono', 'Fira Code', monospace" font-size="38" fill="#22d3ee" text-anchor="middle" font-weight="bold" filter="url(#glow)">01</text>
  <line x1="78" y1="563" x2="312" y2="563" stroke="#22d3ee" stroke-width="1" opacity="0.2"/>
  <text x="195" y="603" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="21" fill="#e2e8f0" text-anchor="middle" font-weight="700" letter-spacing="2">STRATEGIST</text>
  <text x="195" y="636" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">Plans the angle</text>
  <text x="195" y="659" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">picks the hook</text>

  <!-- Arrow 1 -->
  <line x1="348" y1="582" x2="390" y2="582" stroke="url(#arrowGrad)" stroke-width="2.5"/>
  <polygon points="390,574 408,582 390,590" fill="#818cf8" opacity="0.8"/>

  <!-- Agent Tile 2: WRITER -->
  <rect x="400" y="482" width="280" height="200" rx="16" fill="url(#tileBg)" stroke="#818cf8" stroke-width="1" stroke-opacity="0.35"/>
  <text x="540" y="544" font-family="'SF Mono', 'Fira Code', monospace" font-size="38" fill="#818cf8" text-anchor="middle" font-weight="bold" filter="url(#glow)">02</text>
  <line x1="423" y1="563" x2="657" y2="563" stroke="#818cf8" stroke-width="1" opacity="0.2"/>
  <text x="540" y="603" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="21" fill="#e2e8f0" text-anchor="middle" font-weight="700" letter-spacing="2">WRITER</text>
  <text x="540" y="636" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">Drafts the copy</text>
  <text x="540" y="659" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">N variants in parallel</text>

  <!-- Arrow 2 -->
  <line x1="693" y1="582" x2="735" y2="582" stroke="url(#arrowGrad)" stroke-width="2.5"/>
  <polygon points="735,574 753,582 735,590" fill="#a78bfa" opacity="0.8"/>

  <!-- Agent Tile 3: EDITOR -->
  <rect x="745" y="482" width="280" height="200" rx="16" fill="url(#tileBg)" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.35"/>
  <text x="885" y="544" font-family="'SF Mono', 'Fira Code', monospace" font-size="38" fill="#a78bfa" text-anchor="middle" font-weight="bold" filter="url(#glow)">03</text>
  <line x1="768" y1="563" x2="1002" y2="563" stroke="#a78bfa" stroke-width="1" opacity="0.2"/>
  <text x="885" y="603" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="21" fill="#e2e8f0" text-anchor="middle" font-weight="700" letter-spacing="2">EDITOR</text>
  <text x="885" y="636" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">Scores and revises</text>
  <text x="885" y="659" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">picks the winner</text>

  <!-- Raw idea input label -->
  <text x="55" y="724" font-family="'SF Mono', 'Fira Code', monospace" font-size="15" fill="#22d3ee" opacity="0.7" letter-spacing="2">RAW IDEA IN ↗</text>

  <!-- Finished post output label -->
  <text x="745" y="724" font-family="'SF Mono', 'Fira Code', monospace" font-size="15" fill="#a78bfa" opacity="0.7" letter-spacing="2">FINISHED POST OUT ↗</text>

  <!-- Divider -->
  <line x1="60" y1="750" x2="1020" y2="750" stroke="url(#accent)" stroke-width="1" opacity="0.15"/>

  <!-- Mental model section -->
  <rect x="60" y="775" width="960" height="210" rx="16" fill="#0d1120"/>
  <rect x="60" y="775" width="6" height="210" rx="3" fill="url(#accent)"/>

  <text x="110" y="830" font-family="'SF Mono', 'Fira Code', monospace" font-size="18" fill="#475569" letter-spacing="3">THE SHIFT</text>

  <text x="110" y="882" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="38" fill="#64748b" font-weight="300">A tool you call is a <tspan fill="#f87171" font-weight="700">capability</tspan></text>
  <text x="110" y="932" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="38" fill="#64748b" font-weight="300">A process that runs is <tspan fill="#22d3ee" font-weight="700">infrastructure</tspan></text>

  <text x="110" y="970" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#334155">/loop is the shortest path between the two</text>

  <!-- Divider -->
  <line x1="60" y1="1020" x2="1020" y2="1020" stroke="url(#accent)" stroke-width="1" opacity="0.15"/>

  <!-- Tagline -->
  <text x="540" y="1110" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="66" font-weight="700" fill="#f1f5f9" text-anchor="middle" letter-spacing="-1">Drop an idea.</text>
  <text x="540" y="1195" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="66" font-weight="700" fill="url(#heroGrad)" text-anchor="middle" letter-spacing="-1">The loop does the rest.</text>

  <!-- Divider -->
  <line x1="60" y1="1245" x2="1020" y2="1245" stroke="url(#accent)" stroke-width="1" opacity="0.15"/>

  <!-- Byline -->
  <text x="540" y="1295" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="24" fill="#475569" text-anchor="middle" letter-spacing="1">Built by Altaf</text>
  <text x="540" y="1328" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#334155" text-anchor="middle" letter-spacing="3">AI ENGINEERING</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="1345" width="1080" height="5" fill="url(#accent)"/>
</svg>
