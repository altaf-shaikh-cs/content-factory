<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2538"/>
      <stop offset="100%" stop-color="#141e2d"/>
    </linearGradient>
    <linearGradient id="dangerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <radialGradient id="heroGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Hero glow -->
  <ellipse cx="540" cy="270" rx="420" ry="170" fill="url(#heroGlow)"/>

  <!-- Top accent line -->
  <rect x="80" y="80" width="920" height="4" rx="2" fill="url(#accent)"/>

  <!-- Category label -->
  <text x="80" y="146"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="700" letter-spacing="8" fill="#22d3ee">AI INFRASTRUCTURE</text>

  <!-- Hero number -->
  <text x="540" y="330"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="200" font-weight="900" text-anchor="middle" fill="url(#accent)">1</text>

  <!-- Hero sub-label -->
  <text x="540" y="376"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="30" font-weight="300" text-anchor="middle" fill="#cbd5e1" letter-spacing="2">query you send</text>

  <!-- Section divider -->
  <rect x="80" y="415" width="920" height="1" fill="#ffffff" fill-opacity="0.1"/>

  <!-- 2×2 tile grid — tile w=450, h=185, gap=20 -->

  <!-- Tile 1: YOU SUBMIT (top-left) -->
  <rect x="80" y="430" width="450" height="185" rx="14" fill="url(#tile)"/>
  <rect x="80" y="430" width="450" height="4" rx="2" fill="url(#accent)"/>
  <text x="305" y="472"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="17" font-weight="700" letter-spacing="5" text-anchor="middle" fill="#64748b">YOU SUBMIT</text>
  <text x="305" y="543"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="58" font-weight="900" text-anchor="middle" fill="url(#accent)">1</text>
  <text x="305" y="580"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="17" text-anchor="middle" fill="#475569">query</text>

  <!-- Tile 2: COOLING TAKES (top-right) -->
  <rect x="550" y="430" width="450" height="185" rx="14" fill="url(#tile)"/>
  <rect x="550" y="430" width="450" height="4" rx="2" fill="url(#accent)"/>
  <text x="775" y="472"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="17" font-weight="700" letter-spacing="5" text-anchor="middle" fill="#64748b">COOLING TAKES</text>
  <text x="775" y="543"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="44" font-weight="900" text-anchor="middle" fill="url(#accent)">gallons</text>
  <text x="775" y="580"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="17" text-anchor="middle" fill="#475569">of fresh water</text>

  <!-- Tile 3: YOUR INVOICE (bottom-left) -->
  <rect x="80" y="635" width="450" height="185" rx="14" fill="url(#tile)"/>
  <rect x="80" y="635" width="450" height="4" rx="2" fill="url(#accent)"/>
  <text x="305" y="677"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="17" font-weight="700" letter-spacing="5" text-anchor="middle" fill="#64748b">YOUR INVOICE</text>
  <text x="305" y="748"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="54" font-weight="900" text-anchor="middle" fill="url(#accent)">$0.00</text>
  <text x="305" y="785"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="17" text-anchor="middle" fill="#475569">billed to you</text>

  <!-- Tile 4: PLANET'S COST (bottom-right) -->
  <rect x="550" y="635" width="450" height="185" rx="14" fill="url(#tile)"/>
  <rect x="550" y="635" width="450" height="4" rx="2" fill="url(#accent)"/>
  <text x="775" y="677"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="17" font-weight="700" letter-spacing="5" text-anchor="middle" fill="#64748b">PLANET&#8217;S COST</text>
  <text x="775" y="748"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="60" font-weight="900" text-anchor="middle" fill="url(#accent)">???</text>
  <text x="775" y="785"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="17" text-anchor="middle" fill="#475569">invisible to you</text>

  <!-- Footer divider -->
  <rect x="80" y="858" width="920" height="1" fill="#ffffff" fill-opacity="0.1"/>

  <!-- Tagline -->
  <text x="540" y="905"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="300" text-anchor="middle" fill="#94a3b8" letter-spacing="1">
    The bill exists. It just shows up somewhere else.
  </text>

  <!-- Handle — prominent -->
  <text x="540" y="952"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="700" text-anchor="middle" fill="url(#accent)">@teachmebro</text>

  <!-- Byline -->
  <text x="540" y="990"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" font-weight="400" text-anchor="middle" fill="#475569">
    Altaf Shaikh &#183; AI Infrastructure
  </text>
</svg>
