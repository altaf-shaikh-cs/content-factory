<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1080" fill="#f2ede3"/>

  <g stroke="#c9c2b4" stroke-width="1">
    <line x1="880" y1="90" x2="980" y2="150"/>
    <line x1="980" y1="150" x2="930" y2="230"/>
  </g>
  <circle cx="880" cy="90" r="5" fill="#2f7fd6"/>
  <circle cx="980" cy="150" r="4" fill="#b8b1a3"/>
  <circle cx="930" cy="230" r="6" fill="#d95f1e"/>

  <rect x="80" y="94" width="34" height="3" fill="#8a8375"/>
  <text x="128" y="102" font-family="Menlo, Consolas, monospace" font-size="19" letter-spacing="6" fill="#8a8375">THE ADOPTION GAP</text>

  <text x="76" y="230" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="88" font-weight="900" fill="#2b2620">Your company</text>
  <text x="76" y="330" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="88" font-weight="900" fill="#2b2620">didn't <tspan fill="#d95f1e">adopt AI</tspan>.</text>
  <text x="76" y="430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="88" font-weight="900" fill="#2b2620">It bought <tspan fill="#2f7fd6">subscriptions</tspan>.</text>

  <rect x="80" y="486" width="5" height="76" fill="#d95f1e"/>
  <text x="104" y="520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="31" font-weight="700" fill="#2b2620">Four features close the gap. Most teams</text>
  <text x="104" y="556" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="31" font-weight="700" fill="#2b2620">have configured <tspan fill="#d95f1e">none of them</tspan>.</text>

  <g font-family="Menlo, Consolas, monospace">
    <text x="80" y="668" font-size="36" font-weight="700" fill="#d95f1e">skills</text>
    <text x="80" y="700" font-size="18" fill="#8a8375">consistency</text>
    <line x1="330" y1="636" x2="330" y2="702" stroke="#c9c2b4" stroke-width="1"/>
    <text x="360" y="668" font-size="36" font-weight="700" fill="#2f7fd6">plugins</text>
    <text x="360" y="700" font-size="18" fill="#8a8375">capability</text>
    <line x1="650" y1="636" x2="650" y2="702" stroke="#c9c2b4" stroke-width="1"/>
    <text x="680" y="668" font-size="36" font-weight="700" fill="#d95f1e">projects</text>
    <text x="680" y="700" font-size="18" fill="#8a8375">separation</text>

    <text x="80" y="790" font-size="36" font-weight="700" fill="#2f7fd6">artifacts</text>
    <text x="80" y="822" font-size="18" fill="#8a8375">output: real files, not chat text</text>
  </g>

  <rect x="80" y="880" width="920" height="1" fill="#c9c2b4"/>
  <text x="80" y="936" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="27" font-weight="700" fill="#2b2620">Start with one Skill for one weekly workflow.</text>
  <text x="80" y="972" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="27" fill="#5a5346">That's the adoption plan.</text>

  <text x="80" y="1032" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="24" font-weight="800" fill="#2b2620">Altaf Shaikh</text>
  <text x="80" y="1056" font-family="Menlo, Consolas, monospace" font-size="16" fill="#8a8375">// AI Engineering</text>
  <text x="1000" y="1044" font-family="Menlo, Consolas, monospace" font-size="20" font-weight="700" text-anchor="end" fill="#2f7fd6">@teachmebro</text>
</svg>
