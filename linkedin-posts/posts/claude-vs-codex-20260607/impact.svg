<svg viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg" width="1080" height="1350">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="leftTileGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d2d2e"/>
      <stop offset="100%" stop-color="#0a1f20"/>
    </linearGradient>
    <linearGradient id="rightTileGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f1a10"/>
      <stop offset="100%" stop-color="#160f08"/>
    </linearGradient>
    <linearGradient id="leftBorderGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="rightBorderGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="heroLineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="dividerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bgGrad)"/>

  <!-- Subtle grid texture -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  </pattern>
  <rect width="1080" height="1350" fill="url(#grid)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1080" height="3" fill="url(#accentGrad)"/>

  <!-- Series + Context badges -->
  <rect x="60" y="60" width="160" height="36" rx="18" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.7"/>
  <text x="140" y="83" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#22d3ee" text-anchor="middle" letter-spacing="2" opacity="0.9">EXPERIMENT #1</text>

  <rect x="240" y="60" width="160" height="36" rx="18" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
  <text x="320" y="83" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#a78bfa" text-anchor="middle" letter-spacing="2" opacity="0.9">FRONTEND DEV</text>

  <!-- Hero headline -->
  <text x="540" y="200" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="url(#heroLineGrad)" text-anchor="middle" letter-spacing="-1">The gap is the</text>
  <text x="540" y="282" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="url(#heroLineGrad)" text-anchor="middle" letter-spacing="-1">benchmark.</text>

  <!-- Sub-headline -->
  <text x="540" y="348" font-family="Arial, sans-serif" font-size="22" font-weight="400" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">Same task. Two tools. Radically different results.</text>

  <!-- Divider line under headline -->
  <rect x="440" y="378" width="200" height="1.5" fill="url(#accentGrad)" opacity="0.5"/>

  <!-- VS label in center -->
  <text x="540" y="450" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#475569" text-anchor="middle" letter-spacing="4">COMPARISON</text>

  <!-- LEFT TILE -->
  <rect x="60" y="480" width="450" height="480" rx="20" fill="url(#leftTileGrad)"/>
  <rect x="60" y="480" width="4" height="480" rx="2" fill="url(#leftBorderGrad)"/>
  <rect x="60" y="480" width="450" height="480" rx="20" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.2"/>

  <!-- Left tile content -->
  <text x="284" y="570" font-family="Arial, sans-serif" font-size="130" font-weight="900" fill="#22d3ee" text-anchor="middle" filter="url(#subtleGlow)">1</text>
  <text x="284" y="620" font-family="Arial, sans-serif" font-size="36" font-weight="900" fill="#22d3ee" text-anchor="middle" letter-spacing="2" opacity="0.9">PASS</text>

  <rect x="134" y="648" width="300" height="1" fill="#22d3ee" opacity="0.15"/>

  <text x="284" y="695" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#94a3b8" text-anchor="middle" letter-spacing="3">CODEX</text>
  <text x="284" y="730" font-family="Arial, sans-serif" font-size="20" font-weight="400" fill="#cbd5e1" text-anchor="middle">Single-shot execution</text>
  <text x="284" y="760" font-family="Arial, sans-serif" font-size="20" font-weight="400" fill="#cbd5e1" text-anchor="middle">No back-and-forth</text>

  <rect x="184" y="890" width="200" height="40" rx="8" fill="#22d3ee" opacity="0.1"/>
  <text x="284" y="915" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#22d3ee" text-anchor="middle" letter-spacing="1">EFFICIENT</text>

  <!-- RIGHT TILE -->
  <rect x="570" y="480" width="450" height="480" rx="20" fill="url(#rightTileGrad)"/>
  <rect x="570" y="480" width="4" height="480" rx="2" fill="url(#rightBorderGrad)"/>
  <rect x="570" y="480" width="450" height="480" rx="20" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.2"/>

  <!-- Right tile content -->
  <text x="796" y="570" font-family="Arial, sans-serif" font-size="130" font-weight="900" fill="#f59e0b" text-anchor="middle" filter="url(#subtleGlow)">3</text>
  <text x="796" y="620" font-family="Arial, sans-serif" font-size="36" font-weight="900" fill="#f59e0b" text-anchor="middle" letter-spacing="2" opacity="0.9">PROMPTS</text>

  <rect x="646" y="648" width="300" height="1" fill="#f59e0b" opacity="0.15"/>

  <text x="796" y="695" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#94a3b8" text-anchor="middle" letter-spacing="3">CLAUDE</text>
  <text x="796" y="730" font-family="Arial, sans-serif" font-size="20" font-weight="400" fill="#cbd5e1" text-anchor="middle">Required iteration</text>
  <text x="796" y="760" font-family="Arial, sans-serif" font-size="20" font-weight="400" fill="#cbd5e1" text-anchor="middle">Multiple corrections</text>

  <rect x="696" y="890" width="200" height="40" rx="8" fill="#f59e0b" opacity="0.1"/>
  <text x="796" y="915" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#f59e0b" text-anchor="middle" letter-spacing="1">ITERATIVE</text>

  <!-- Center VS divider (vertical) -->
  <rect x="536" y="520" width="8" height="400" rx="4" fill="url(#dividerGrad)"/>
  <rect x="528" y="700" width="24" height="24" rx="12" fill="#1e293b"/>
  <text x="540" y="716" font-family="Arial, sans-serif" font-size="11" font-weight="900" fill="#64748b" text-anchor="middle">VS</text>

  <!-- Insight bar -->
  <rect x="60" y="990" width="960" height="80" rx="12" fill="#0f172a"/>
  <rect x="60" y="990" width="960" height="80" rx="12" fill="none" stroke="#1e293b" stroke-width="1"/>
  <rect x="60" y="990" width="4" height="80" rx="2" fill="url(#accentGrad)"/>
  <text x="540" y="1023" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#e2e8f0" text-anchor="middle" letter-spacing="0.3">Performance gap:</text>
  <text x="540" y="1053" font-family="Arial, sans-serif" font-size="17" font-weight="400" fill="#94a3b8" text-anchor="middle">Codex needed 3x fewer interactions to complete the same frontend task.</text>

  <!-- Tagline -->
  <text x="540" y="1145" font-family="Arial, sans-serif" font-size="58" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-0.5">Right tool.</text>
  <text x="540" y="1215" font-family="Arial, sans-serif" font-size="58" font-weight="900" fill="url(#accentGrad)" text-anchor="middle" letter-spacing="-0.5">Right job.</text>

  <!-- Bottom divider -->
  <rect x="60" y="1260" width="960" height="1" fill="#1e293b"/>

  <!-- Byline -->
  <text x="540" y="1300" font-family="Arial, sans-serif" font-size="15" font-weight="400" fill="#475569" text-anchor="middle" letter-spacing="2">BUILT BY ALTAF  ·  AI EXPERIMENTS</text>

  <!-- Bottom accent line -->
  <rect x="0" y="1347" width="1080" height="3" fill="url(#accentGrad)"/>
</svg>
