<svg viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">

  <!-- Background: white -->
  <rect width="1080" height="1350" fill="#ffffff"/>

  <!-- Filter: subtle roughen for hand-drawn feel -->
  <defs>
    <filter id="roughen" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="roughen-strong" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Soft purple watercolor wash behind tangle -->
  <ellipse cx="390" cy="290" rx="230" ry="185" fill="#7C3AED" opacity="0.045"/>

  <!-- SCRIBBLE TANGLE — organic hand-drawn chaos -->
  <!-- Each path mimics actual pen movement: zigzags, loops, reversals -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#roughen)">

    <!-- Long wandering scrawl across the whole zone -->
    <path d="M 195,310 C 235,205 310,190 355,240 C 400,290 370,355 330,340
             C 285,325 295,265 345,255 C 395,245 440,295 420,350
             C 400,405 340,415 300,390 C 255,362 270,305 310,295
             C 355,282 395,325 415,300 C 440,272 430,220 480,215
             C 530,210 545,265 510,295 C 475,325 430,310 445,270"
          stroke="#aaaaaa" stroke-width="3.5" opacity="0.6"/>

    <!-- Tight scribble loop cluster left-center -->
    <path d="M 215,260 C 260,180 340,175 360,240 C 382,310 310,360 265,335
             C 220,308 240,252 285,248 C 332,243 355,285 335,320
             C 312,358 268,355 248,325 C 225,292 242,258 270,258
             C 300,258 318,285 305,310 C 290,337 262,335 252,315"
          stroke="#999999" stroke-width="4" opacity="0.5"/>

    <!-- Wild back-and-forth strokes -->
    <path d="M 300,155 C 380,170 460,145 500,195 C 540,245 510,310 460,300
             C 407,288 400,235 440,225 C 478,215 500,255 480,285
             C 458,318 415,315 405,285 C 393,252 415,225 450,228"
          stroke="#bbbbbb" stroke-width="3" opacity="0.55"/>

    <!-- Overlapping figure-eight style loop -->
    <path d="M 240,350 C 290,310 350,320 365,360 C 382,403 350,440 310,435
             C 268,429 250,395 270,370 C 292,342 330,345 340,375
             C 350,405 330,430 305,425 C 278,419 265,395 278,375
             C 292,353 318,355 325,378"
          stroke="#aaaaaa" stroke-width="3.5" opacity="0.52"/>

    <!-- Frantic short strokes — pen jitter in upper right of cluster -->
    <path d="M 430,170 C 455,155 480,165 485,185 C 490,207 472,220 458,213
             C 441,205 443,188 458,184 C 475,180 488,193 480,207
             C 471,222 454,220 448,208"
          stroke="#cccccc" stroke-width="2.5" opacity="0.6"/>

    <!-- Dense crosshatch-style wanderer -->
    <path d="M 195,200 C 255,165 330,170 345,215 C 362,262 320,295 280,285
             C 238,273 228,235 255,220 C 284,204 318,215 322,245
             C 326,275 305,292 280,285"
          stroke="#bbbbbb" stroke-width="4" opacity="0.48"/>

    <!-- Spiral-ish path unwinding -->
    <path d="M 390,235 C 415,210 448,215 455,240 C 463,268 444,288 422,282
             C 398,275 388,252 400,236 C 413,219 435,222 442,242
             C 449,263 437,280 420,277"
          stroke="#aaaaaa" stroke-width="3" opacity="0.55"/>

    <!-- Long swooping cross-stroke -->
    <path d="M 185,390 C 240,360 295,375 320,415 C 348,458 325,500 285,488
             C 243,475 235,440 262,425 C 290,409 320,425 318,455
             C 316,485 292,496 270,485"
          stroke="#bbbbbb" stroke-width="3.5" opacity="0.5"/>

    <!-- Jagged zigzag across zone -->
    <path d="M 210,235 C 228,220 248,228 242,248 C 235,270 210,272 208,252
             C 205,230 225,218 240,224 C 258,232 262,255 248,265
             C 233,276 215,268 215,252"
          stroke="#cccccc" stroke-width="2.8" opacity="0.6"/>

    <!-- Mid-density scrawl connecting top to bottom of tangle -->
    <path d="M 355,165 C 395,140 440,155 450,190 C 461,228 440,258 410,250
             C 378,241 370,210 390,198 C 412,185 438,197 440,222
             C 443,248 425,262 405,256
             C 383,249 374,225 388,212"
          stroke="#aaaaaa" stroke-width="3.8" opacity="0.52"/>

    <!-- Short scratchy marks adding texture -->
    <path d="M 290,210 C 305,200 318,207 314,220 C 309,235 295,234 292,222" stroke="#bbbbbb" stroke-width="2.5" opacity="0.55"/>
    <path d="M 345,290 C 362,280 375,290 370,305 C 364,322 347,321 344,307" stroke="#cccccc" stroke-width="2.5" opacity="0.5"/>
    <path d="M 265,305 C 280,294 293,302 288,316 C 282,332 266,331 263,317" stroke="#aaaaaa" stroke-width="2.5" opacity="0.55"/>
    <path d="M 420,255 C 436,246 448,254 444,268 C 438,284 422,283 419,269" stroke="#bbbbbb" stroke-width="2.5" opacity="0.5"/>
    <path d="M 320,180 C 334,170 346,178 342,192 C 336,207 321,206 318,192" stroke="#cccccc" stroke-width="2.5" opacity="0.55"/>
    <path d="M 240,180 C 255,172 265,179 261,193 C 255,208 241,206 239,193" stroke="#aaaaaa" stroke-width="2.5" opacity="0.5"/>

    <!-- Final messy cluster — dense short paths -->
    <path d="M 465,295 C 490,280 510,290 505,308 C 498,330 474,328 469,311" stroke="#bbbbbb" stroke-width="3" opacity="0.48"/>
    <path d="M 370,415 C 395,403 413,413 408,430 C 401,450 376,448 370,431" stroke="#aaaaaa" stroke-width="2.8" opacity="0.5"/>

  </g>

  <!-- Single clean purple path emerging from the chaos — slightly roughened -->
  <path d="M 375,470 C 425,570 495,685 528,795"
        fill="none" stroke="#7C3AED" stroke-width="5.5" stroke-linecap="round" opacity="0.92"
        filter="url(#roughen-strong)"/>

  <!-- Dot at end of clean path — arrival point -->
  <circle cx="529" cy="800" r="9" fill="#7C3AED" opacity="0.9"/>

  <!-- Main text -->
  <text x="80" y="900"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="102" font-weight="900" fill="#1a1a1a">
    Start here.
  </text>
  <text x="80" y="1014"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="102" font-weight="900" fill="#7C3AED">
    Not everywhere.
  </text>

  <!-- Horizontal rule -->
  <line x1="80" y1="1060" x2="620" y2="1060" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- Domain label -->
  <text x="80" y="1108"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="400" fill="#888888" letter-spacing="4">
    GEN AI &#183; LEVEL 1 ROADMAP
  </text>

  <!-- Sub-message -->
  <text x="80" y="1152"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="400" fill="#888888" font-style="italic">
    Core fundamentals. The stuff that stays.
  </text>

  <!-- Handle — prominent accent -->
  <text x="80" y="1248"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="46" font-weight="700" fill="#7C3AED">
    @teachmebro
  </text>

  <!-- Author -->
  <text x="80" y="1296"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="700" fill="#1a1a1a">
    Altaf Shaikh
  </text>

  <!-- Domain byline -->
  <text x="80" y="1328"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="400" fill="#888888">
    // AI Engineering / Gen AI
  </text>

</svg>
